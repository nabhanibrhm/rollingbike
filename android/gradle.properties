org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Workaround for a Kotlin Build Tools API bug on Flutter 3.44's Kotlin/Gradle stack
# ("Could not close incremental caches ... Storage is already registered", seen on Windows).
# Disabling incremental Kotlin compilation avoids the faulty cache code path. Negligible
# build-time cost for an app with this little Kotlin (just MainActivity + plugin glue).
kotlin.incremental=false
