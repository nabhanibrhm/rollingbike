name: rollingbike
description: "Offline-first riding telemetry tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- State management ---
  flutter_riverpod: ^2.6.1            # proven 2.6.x line (3.x exists but adds migration churn)

  # --- Local embedded DB ---
  # isar_community is the maintained drop-in fork of the (now dormant) `isar`.
  # API-identical, with fixes for modern Android (incl. 16KB page sizes).
  # All three isar_community_* packages MUST stay on the same exact version.
  isar_community: 3.3.2
  isar_community_flutter_libs: 3.3.2

  # --- Geolocation + background execution ---
  geolocator: ^14.0.3
  flutter_background_service: ^5.1.0

  # --- Map + spatial math ---
  flutter_map: ^8.3.0                 # v8 API (differs from older flutter_map tutorials)
  latlong2: ^0.9.1

  # --- Permissions (background location, notifications) ---
  permission_handler: ^11.3.1

  # --- Filesystem path for the Isar directory + tile cache ---
  path_provider: ^2.1.5

  # --- Typography ---
  # Inter (UI) + JetBrains Mono (legacy) are bundled as assets (see `flutter.fonts`
  # below) rather than fetched at runtime, so type renders offline from first launch.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_community_generator: 3.3.2     # must match isar_community version above
  flutter_launcher_icons: ^0.14.1     # regenerates Android launcher icons from assets/icon

# Launcher icon generation (Android only — iOS intentionally left untouched).
#   Regenerate with:  dart run flutter_launcher_icons
# Adaptive icon = transparent speedometer foreground over the brand near-black.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/logo_legacy.png"              # legacy (pre-API 26) square icon
  adaptive_icon_foreground: "assets/icon/logo_foreground.png"  # mark pre-scaled + centered
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground_inset: 0                      # padding is baked into the asset

flutter:
  uses-material-design: true

  assets:
    - assets/icon/logo_transparent.png

  # Inter (the app's UI face, matching the design prototype) bundled locally
  # for offline-first typography (see app_theme).
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
